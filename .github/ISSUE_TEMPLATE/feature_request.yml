name: Feature request
description: Suggest an enhancement or new capability for lingo-loop.
title: "[feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem first, then your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.
    validations:
      required: false

  - type: checkboxes
    id: hosts
    attributes:
      label: Hosts affected
      description: Which agent hosts does this feature touch?
      options:
        - label: Claude
        - label: Codex
        - label: Hermes
        - label: OpenClaw
        - label: All
    validations:
      required: true
