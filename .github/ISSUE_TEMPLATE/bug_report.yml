name: Bug report
description: Report a defect in lingo-loop.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue.

  - type: dropdown
    id: host
    attributes:
      label: Host
      description: Which agent host were you using when the bug occurred?
      options:
        - Claude
        - Codex
        - Hermes
        - OpenClaw
        - Other
    validations:
      required: true

  - type: input
    id: tutor-version
    attributes:
      label: tutor version
      description: "`Version:` line from `pip show lingo-loop` (or commit SHA if installed from source)."
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: host-version
    attributes:
      label: Host version
      description: Version of the agent host (Claude Code, Codex CLI, etc.).
      placeholder: "e.g. claude-code 1.4.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `tutor ...`
        2. Type `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs, stack traces, or terminal output. Will be rendered as a code block.
      render: shell
    validations:
      required: false
