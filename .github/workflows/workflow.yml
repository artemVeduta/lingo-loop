# PyPI release workflow.
# Filename `workflow.yml` is bound to the PyPI Trusted Publisher
# config for `lingo-loop`. Do NOT rename without simultaneously
# updating the PyPI publisher entry (Manage -> Publishing).
#
# Tag pattern routing:
#   v0.1.0          -> pypi      environment, pypi.org,      release
#   v0.1.0-rc.1     -> testpypi  environment, test.pypi.org, prerelease
#   v0.1.0-alpha.1  -> testpypi
#   v0.1.0-beta.1   -> testpypi
name: workflow

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to publish (e.g. v0.1.0 or v0.1.0-rc.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.ref || github.ref_name }}"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|alpha|beta)\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "environment=testpypi" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "environment=pypi" >> "$GITHUB_OUTPUT"
          else
            echo "::error::tag '${TAG}' is not a recognized release or prerelease tag"
            exit 1
          fi

      - name: Version guard (tag matches pyproject)
        run: ./scripts/version-guard.sh "${{ steps.tag.outputs.name }}"

      - name: Build sdist + wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

    outputs:
      tag: ${{ steps.tag.outputs.name }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
      environment: ${{ steps.tag.outputs.environment }}

  publish-pypi:
    name: publish (pypi)
    needs: build
    if: needs.build.outputs.environment == 'pypi'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/lingo-loop/
    permissions:
      id-token: write
      contents: write
    env:
      UV_PYTHON: "3.12"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing + attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: dist/*

  publish-testpypi:
    name: publish (testpypi)
    needs: build
    if: needs.build.outputs.environment == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/lingo-loop/
    permissions:
      id-token: write
      contents: write
    env:
      UV_PYTHON: "3.12"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI (Trusted Publishing + attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          repository-url: https://test.pypi.org/legacy/

      - name: Create GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: dist/*
